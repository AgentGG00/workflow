name: Release

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Git-Cliff installieren
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Aktuelle Version ermitteln
        id: current_version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            echo "version=v0.0.0" >> $GITHUB_OUTPUT
          else
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Nächste Version berechnen
        id: next_version
        run: |
          CURRENT=${{ steps.current_version.outputs.version }}
          MAJOR=$(echo $CURRENT | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          COMMITS=$(git log ${CURRENT}..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE '^.+!'; then
            MAJOR=$((MAJOR + 1))
          elif echo "$COMMITS" | grep -qE '^feat'; then
            MINOR=$((MINOR + 1))
          else
            PATCH=$((PATCH + 1))
          fi

          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Changelog generieren
        run: |
          VERSION=${{ steps.next_version.outputs.version }}
          mkdir -p Changelog
          git cliff --tag "$VERSION" --unreleased --output "Changelog/${VERSION}.md"

      - name: Git konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Tag setzen und Changelog committen
        run: |
          VERSION=${{ steps.next_version.outputs.version }}
          git add Changelog/
          git commit -m "init(release): ${VERSION} [skip ci]"
          git tag "$VERSION"
          git push origin main --tags
        env:
          GH_TOKEN: ${{ secrets.PAT }}

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          VERSION=${{ steps.next_version.outputs.version }}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "Changelog/${VERSION}.md"
