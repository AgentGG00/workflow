name: CI Build

on:
  workflow_call:

jobs:
  detect-stack:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      node: ${{ steps.detect.outputs.node }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stack erkennen
        id: detect
        run: |
          if [ -f "requirements.txt" ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          else
            echo "python=false" >> $GITHUB_OUTPUT
          fi

          if [ -f "package.json" ]; then
            echo "node=true" >> $GITHUB_OUTPUT
          else
            echo "node=false" >> $GITHUB_OUTPUT
          fi

  python:
    needs: detect-stack
    if: needs.detect-stack.outputs.python == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Linting
        run: |
          pip install ruff
          ruff check .

  node:
    needs: detect-stack
    if: needs.detect-stack.outputs.node == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Linting
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present
