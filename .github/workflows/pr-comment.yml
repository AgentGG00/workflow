name: PR Comment

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Struktur Artifact laden
        uses: actions/download-artifact@v4
        with:
          name: review-struktur
          path: review-result

      - name: Secrets Artifact laden
        uses: actions/download-artifact@v4
        with:
          name: review-secrets
          path: review-result

      - name: PR Comment schreiben
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const struktur = fs.readFileSync('review-result/struktur.txt', 'utf8').trim();
            const secrets = fs.readFileSync('review-result/secrets.txt', 'utf8').trim();

            const icon = (r) => r === 'success' ? '✅' : '❌';

            const body = `## Review Ergebnis

            | Check | Status |
            |---|---|
            | Struktur | ${icon(struktur)} |
            | Secrets Scan | ${icon(secrets)} |

            ${struktur === 'failure' ? '> ⚠️ Pflichtdateien fehlen – siehe Job-Log für Details.' : ''}
            ${secrets === 'failure' ? '> 🔐 Mögliche Secrets gefunden – siehe Gitleaks Job-Log.' : ''}
            `;

            github.rest.issues.createComment({
              issue_number: ${{ inputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
