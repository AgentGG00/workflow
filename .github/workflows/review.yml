name: Review

on:
  workflow_call:
    outputs:
      struktur:
        value: ${{ jobs.struktur.result }}
      secrets_scan:
        value: ${{ jobs.secrets-scan.result }}

jobs:
  struktur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pflichtdateien prüfen
        id: struktur
        run: |
          ERRORS=""

          check_file() {
            if [ ! -f "$1" ]; then
              ERRORS="${ERRORS}\n❌ $1 fehlt"
            else
              echo "✅ $1 vorhanden"
            fi
          }

          check_file "README.md"
          check_file ".gitignore"
          check_file ".env.example"
          check_file "Dockerfile"
          check_file "docker-compose.yml"
          check_file "docs/projekt-plan.md"
          check_file "docs/projekt-stand.md"
          check_file "docs/cliff.toml"

          if [ ! -f "requirements.txt" ] && [ ! -f "package.json" ]; then
            ERRORS="${ERRORS}\n❌ requirements.txt oder package.json fehlt"
          elif [ -f "requirements.txt" ] && [ -f "package.json" ]; then
            echo "✅ requirements.txt vorhanden"
            echo "✅ package.json vorhanden"
          elif [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt vorhanden"
          else
            echo "✅ package.json vorhanden"
          fi

          if [ -n "$ERRORS" ]; then
            echo "errors<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks installieren
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
