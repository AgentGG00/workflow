name: Review

on:
  workflow_call:

jobs:
  struktur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pflichtdateien prüfen
        run: |
          ERRORS=""

          check_file() {
            if [ ! -f "$1" ]; then
              ERRORS="${ERRORS}\n❌ $1 fehlt"
            else
              echo "✅ $1 vorhanden"
            fi
          }

          check_file "README.md"
          check_file ".gitignore"
          check_file ".env.example"
          check_file "Dockerfile"
          check_file "docker-compose.yml"
          check_file "docs/projekt-plan.md"
          check_file "docs/projekt-stand.md"
          check_file "docs/cliff.toml"

          if [ ! -f "requirements.txt" ] && [ ! -f "package.json" ]; then
            ERRORS="${ERRORS}\n❌ requirements.txt oder package.json fehlt"
          elif [ -f "requirements.txt" ] && [ -f "package.json" ]; then
            echo "✅ requirements.txt vorhanden"
            echo "✅ package.json vorhanden"
          elif [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt vorhanden"
          else
            echo "✅ package.json vorhanden"
          fi

          mkdir -p review-result
          if [ -n "$ERRORS" ]; then
            echo "failure" > review-result/struktur.txt
            exit 1
          else
            echo "success" > review-result/struktur.txt
          fi

      - name: Artifact speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-struktur
          path: review-result/struktur.txt

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ergebnis speichern
        if: always()
        run: |
          mkdir -p review-result
          if [ "${{ job.status }}" = "success" ]; then
            echo "success" > review-result/secrets.txt
          else
            echo "failure" > review-result/secrets.txt
          fi

      - name: Artifact speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-secrets
          path: review-result/secrets.txt
